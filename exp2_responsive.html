<!DOCTYPE html>
<html>
<head>

<title>Responsive Web Page</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h2{
text-align:center;
color:#6a1b9a;
}

.container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px lightgray;
}

.card img{
width:100%;
height:150px;
border-radius:10px;
}

.card h3{
color:#6a1b9a;
}

.flex{
display:flex;
gap:20px;
margin-top:20px;
}

.item{
flex:1;
background:#ffcc80;
padding:20px;
text-align:center;
border-radius:10px;
font-size:20px;
}

@media(max-width:700px){

.container{
grid-template-columns:1fr;
}

.flex{
flex-direction:column;
}

}

</style>
</head>

<body>

<h2>Responsive Web Design</h2>

<div class="container">

<div class="card">
<img src="https://picsum.photos/300/150?1">
<h3>HTML5</h3>
<p>Semantic structure for web pages.</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/150?2">
<h3>CSS3</h3>
<p>Responsive and attractive styling.</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/150?3">
<h3>JavaScript</h3>
<p>Interactive web page functionality.</p>
</div>

</div>

<div class="flex">

<div class="item">Flexbox Layout</div>

<div class="item">Media Queries</div>

</div>

</body>
</html>
