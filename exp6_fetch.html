<!DOCTYPE html>
<html>
<head>

<title>Fetch API</title>

<style>

body{
    font-family:Arial;
    background:#eef;
    padding:20px;
}

.container{
    width:400px;
    margin:auto;
    background:white;
    padding:20px;
}

input{
    width:100%;
    padding:8px;
    box-sizing:border-box;
}

button{
    background:#0077b6;
    color:white;
    border:none;
    padding:10px;
    margin-top:10px;
}

.card{
    background:#f4f4f4;
    padding:15px;
    margin-top:20px;
}

img{
    width:100%;
    height:180px;
}

</style>
</head>

<body>

<div class="container">

<h2>Country Information</h2>

Enter Country Name:

<input type="text" id="country">

<button onclick="loadCountry()">
Get Details
</button>

<div id="result"></div>

</div>

<script>

function loadCountry(){

let countryName=
document.getElementById("country").value;

fetch("https://restcountries.com/v3.1/name/"+countryName)

.then(response=>response.json())

.then(data=>{

let country=data[0];

document.getElementById("result").innerHTML=

"<div class='card'>" +

"<img src='"+country.flags.png+"'>" +

"<h3>"+country.name.common+"</h3>" +

"<p>Capital: "+country.capital+"</p>" +

"<p>Region: "+country.region+"</p>" +

"<p>Population: "+country.population+"</p>" +

"</div>";

});

}

</script>

</body>
</html>
