<!DOCTYPE html>
<html>
<head>
<title>Static Website</title>

<style>

body{
    font-family:Arial;
    background:#f0f8ff;
    margin:20px;
}

header{
    background:#0077b6;
    color:white;
    padding:15px;
    text-align:center;
}

section{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}

table{
    width:40%;
    border-collapse:collapse;
}

th,td{
    border:1px solid gray;
    padding:10px;
    text-align:center;
    width: 33%;
}

button{
    background:#0077b6;
    color:white;
    border:none;
    padding:10px;
}

</style>
</head>

<body>

<header>
    <h1>Static Website</h1>
</header>

<section>

<h2>Student Form</h2>

<form>

Name:
<input type="text"><br><br>

Email:
<input type="email"><br><br>

<button>Submit</button>

</form>

</section>

<section>

<h2>Student Table</h2>

<table>

<tr>
<th>Name</th>
<th>Age</th>
</tr>

<tr>
<td>Ali</td>
<td>20</td>
</tr>

</table>

</section>

<section>

<h2>Audio & Video</h2>

<audio controls>
<source src="audio.mp3">
</audio>

<br><br>

<video width="300" controls>
<source src="video.mp4">
</video>

</section>

</body>
</html>
