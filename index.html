<!DOCTYPE html>
<html>
<head>

<title>GET and POST</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:50px;
}

.box{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
}

input,button{
width:90%;
padding:10px;
margin:10px;
font-size:18px;
}

button{
background:#8e44ad;
color:white;
border:none;
}

</style>
</head>

<body>

<div class="box">

<h2>GET and POST Request</h2>

<form action="http://localhost:3000" method="GET">

<button>
GET Request
</button>

</form>

<form action="http://localhost:3000/submit" method="POST">

<input type="text" name="name" placeholder="Enter Name">

<button>
POST Request
</button>

</form>

</div>

</body>
</html>
